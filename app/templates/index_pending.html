<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>等待批准 - 记一下</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container compact-page">
    <header class="header capture-header center-header">
      <h1>等待批准</h1>
      <p class="subtitle">这台设备已经发起申请，在批准完成前不能进入记录组。</p>
      {% if device and device.user_name %}
        <p class="device-info">目标记录组：{{ device.user_name }}</p>
      {% endif %}
    </header>

    <section class="capture-box capture-box-focus pending-panel">
      <div class="status-badge pending pending-hero">审批中</div>
      <p class="pending-copy">请等待管理员或组内已批准设备完成审批。批准完成后，刷新页面即可进入。</p>
    </section>

    <section class="quick-links quick-links-center">
      <a class="subtle-link" href="/">刷新状态</a>
    </section>
  </main>
</body>
</html>
