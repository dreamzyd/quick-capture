{% if items %}
<div class="subtle-list">
  <div class="subtle-list-header">
    <span class="subtle-list-title">最近记录</span>
    <a class="subtle-link" href="/me">查看全部 →</a>
  </div>
  <ul class="subtle-list-items">
    {% for item in items %}
      <li class="subtle-list-item">{{ item.content }}</li>
    {% endfor %}
  </ul>
</div>
{% else %}
<div class="subtle-list">
  <div class="subtle-list-header">
    <span class="subtle-list-title">最近记录</span>
  </div>
  <div class="empty subtle-empty">还没有记录，先写第一条吧。</div>
</div>
{% endif %}
