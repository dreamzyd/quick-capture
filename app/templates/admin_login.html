<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录 - 记一下</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container compact-page">
    <header class="header capture-header">
      <h1>管理员登录</h1>
      <p class="subtitle">设备管理和账号视图需要管理员验证，避免陌生人直接看到内部设备信息。</p>
    </header>

    <section class="capture-box capture-box-focus">
      {% if error %}
        <div class="feedback-panel feedback-error">{{ error }}</div>
      {% endif %}
      <form action="/admin/login" method="post">
        <input type="password" name="password" placeholder="输入管理员密码" required autofocus />
        <div class="action-row action-row-focus">
          <button type="submit" class="primary primary-big">进入管理区</button>
        </div>
      </form>
          <p class="form-tip">如果你只是想记录内容或查看自己的设备，请回到普通首页，不需要进入管理员区。</p>
    </section>
  </main>
</body>
</html>
