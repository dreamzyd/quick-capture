<!doctype html>
<html lang="zh-CN">
<head>

  <title>记一下</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

      <h1>记一下</h1>
      <p class="subtitle">先记下来，别打断自己。</p>

      <p class="subtitle" style="margin-bottom: 24px;">选择你的使用方式</p>
      <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
        <a href="/create-group" class="primary primary-big" style="width: 200px;">新建组</a>
        <a href="/join" class="secondary-button primary-big" style="width: 200px;">加入组</a>
      </div>
    </section>

    <section class="quick-links" style="justify-content: center; margin-top: 32px;">
      <p class="hint">新建组需要管理员批准，加入组需要组员批准</p>
    </section>
