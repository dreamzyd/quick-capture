<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新建组 - 记一下</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container compact-page">
    <header class="header capture-header">
      <div class="title-row">
        <div>
          <h1>新建组</h1>
          <p class="subtitle">创建你自己的记录组，需要管理员批准后才能使用。</p>
          {% if device %}
            <p class="device-info">当前设备：{{ device.device_name or '新设备' }}</p>
          {% endif %}
        </div>
        <div class="toolbar-actions">
          <a class="nav-link" href="/">首页</a>
          <a class="nav-link" href="/join">加入组</a>
        </div>
      </div>
    </header>

    <section class="capture-box capture-box-focus">
      {% if error %}
        <div class="feedback-panel feedback-error">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="feedback-panel feedback-success">{{ success }}</div>
      {% endif %}
      <form action="/create-group" method="post" class="submit-once-form">
        <input type="text" name="group_name" placeholder="输入组名（如：我的工作、我的家庭）" required autofocus maxlength="80" />
        <p class="form-tip">创建后会进入等待管理员批准状态。在批准前，你会看到等待页，而不是采集页。</p>
        <div class="action-row action-row-focus">
          <button type="submit" class="primary primary-big" data-loading-text="正在创建...">创建组</button>
        </div>
      </form>
    </section>
  </main>
  <script src="/static/form-guard.js"></script>
</body>
</html>
